/*  LOGIN PAGE                                                     */
/* ═══════════════════════════════════════════════════════════════ */
function LoginPage({onBack,onLoginSuccess}) {
  const [users] = useState(()=>load('ikt_users',INITIAL_USERS));
  const [u,setU]=useState('');const [p,setP]=useState('');
  const [err,setErr]=useState('');const [loading,setLoading]=useState(false);
  const [showP,setShowP]=useState(false);

  const submit = e => {
    e.preventDefault(); setErr(''); setLoading(true);
    setTimeout(()=>{
      // Always check hardcoded admin first
      if(u.trim()==='iktadmin' && p==='IKT@2024'){
        onLoginSuccess({id:1,username:'iktadmin',password:'IKT@2024',role:'admin',name:'IKT Admin',active:true});
        return;
      }
      const user = users.find(x=>x.username===u.trim()&&x.password===p);
      if(!user){ setErr('Invalid username or password.'); setLoading(false); return; }
      if(!user.active){ setErr('Your account is inactive. Contact admin.'); setLoading(false); return; }
      onLoginSuccess(user);
    },800);
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(var(--border)22 1px,transparent 1px),linear-gradient(90deg,var(--border)22 1px,transparent 1px)',backgroundSize:'48px 48px',pointerEvents:'none'}}/>
      <div style={{position:'absolute',width:600,height:600,borderRadius:'50%',background:'radial-gradient(circle,#f5b73112 0%,transparent 65%)',top:'40%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none'}}/>
      <nav style={{position:'relative',zIndex:1,padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between',height:64,borderBottom:'1px solid var(--border)'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'var(--text2)',cursor:'pointer',display:'flex',alignItems:'center',gap:8,fontSize:14}}>
          ← Back to Home
        </button>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Logo size={28}/><span style={{fontWeight:700,fontSize:15}}>IKT Investors Club</span>
        </div>
      </nav>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:24,position:'relative',zIndex:1}}>
        <div style={loginStyles.card}>
          <div style={{textAlign:'center',marginBottom:28}}>
            <Logo size={48} center/>
            <div style={{fontSize:22,fontWeight:700,marginTop:14}}>Member Login</div>
            <div style={{fontSize:13,color:'var(--text2)',marginTop:6}}>Access your IKT signal dashboard</div>
          </div>
          <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
            <Field label="Username">
              <input style={loginStyles.input} value={u} onChange={e=>setU(e.target.value)} placeholder="Your username"/>
            </Field>
            <Field label="Password">
              <div style={{position:'relative'}}>
                <input style={loginStyles.input} type={showP?'text':'password'} value={p} onChange={e=>setP(e.target.value)} placeholder="Your password"/>
                <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:11,letterSpacing:1}}>
                  {showP?'HIDE':'SHOW'}
                </button>
              </div>
            </Field>
            {err&&<div style={loginStyles.err}>{err}</div>}
            <button type="submit" disabled={loading} style={{...loginStyles.btn,opacity:loading?0.7:1}}>
              {loading?'Authenticating...':'Login to Portal'}
            </button>
          </form>
          <div style={{marginTop:24,textAlign:'center',fontSize:12,color:'var(--text3)',lineHeight:1.8}}>
            Don't have an account? DM <span style={{color:'var(--gold)'}}>@india.ka.trader</span> on Instagram<br/>to get your access credentials.
          </div>
        </div>
      </div>
    </div>
  );
}

/*  MEMBER DASHBOARD                                              */
/* ═══════════════════════════════════════════════════════════════ */
function MemberDashboard({user,onLogout}) {
  const [tab,setTab]=useState('swing');
  const [swing,setSwing]=useState(()=>load('ikt_swing',INITIAL_SWING));
  const [lt,setLt]=useState(()=>load('ikt_lt',INITIAL_LT));
  const [users,setUsers]=useState(()=>load('ikt_users',INITIAL_USERS));
  const [modal,setModal]=useState(null); // {type:'addSignal'|'editSignal'|'addUser'|'editUser'|'chart', data?}

  const isAdmin = user.role==='admin';

  useEffect(()=>{save('ikt_swing',swing)},[swing]);
  useEffect(()=>{save('ikt_lt',lt)},[lt]);
  useEffect(()=>{save('ikt_users',users)},[users]);

  const allSignals=[...swing,...lt];
  const winners=allSignals.filter(t=>t.cmp>t.buyPrice).length;
  const swingAvg = swing.length?(swing.reduce((s,t)=>s+pct(t),0)/swing.length):0;
  const ltAvg = lt.length?(lt.reduce((s,t)=>s+pct(t),0)/lt.length):0;

  const addSignal=data=>{const arr=data.category==='swing'?swing:lt;const set=data.category==='swing'?setSwing:setLt;set([...arr,{...data,id:Date.now()}]);setModal(null)};
  const editSignal=data=>{const set=data.category==='swing'?setSwing:setLt;const arr=data.category==='swing'?swing:lt;set(arr.map(x=>x.id===data.id?data:x));const other=data.category==='swing'?lt:swing;const otherSet=data.category==='swing'?setLt:setSwing;otherSet(other.filter(x=>x.id!==data.id));setModal(null)};
  const deleteSignal=(id,cat)=>{if(cat==='swing')setSwing(s=>s.filter(x=>x.id!==id));else setLt(s=>s.filter(x=>x.id!==id));};
  const addUser=data=>{setUsers(u=>[...u,{...data,id:Date.now(),role:'member',active:true}]);setModal(null)};
  const toggleUser=id=>{setUsers(u=>u.map(x=>x.id===id?{...x,active:!x.active}:x))};
  const deleteUser=id=>{setUsers(u=>u.filter(x=>x.id!==id))};

  const tabs=[
    {id:'swing',label:'⚡ Swing Signals',count:swing.length},
    {id:'lt',label:'🏔 Long Term',count:lt.length},
    {id:'chart',label:'📊 P&L Chart'},
    ...(isAdmin?[{id:'admin',label:'⚙ Manage'}]:[]),
  ];

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* TOP NAV */}
      <nav style={{background:'var(--bg2)',borderBottom:'1px solid var(--border)',padding:'0 28px',display:'flex',alignItems:'center',gap:16,height:62,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginRight:8}}>
          <Logo size={28}/><span style={{fontWeight:700,fontSize:15,letterSpacing:-0.3}}>IKT Investors Club</span>
        </div>
        <div style={{height:24,width:1,background:'var(--border)'}}/>
        <div style={{display:'flex',gap:4,flex:1}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{...navStyles.tab,...(tab===t.id?navStyles.tabActive:{})}}>
              {t.label}{t.count!=null?<span style={{...navStyles.badge,...(tab===t.id?{background:'#f5b73133',color:'var(--gold)'}:{})}}>{t.count}</span>:null}
            </button>
          ))}
        </div>
        {isAdmin&&(
          <button onClick={()=>setModal({type:'addSignal'})} style={navStyles.addBtn}>
            + New Signal
          </button>
        )}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:13,fontWeight:600}}>{user.name}</div>
            <div style={{fontSize:10,color:'var(--gold)',letterSpacing:0.5}}>{isAdmin?'ADMIN':'MEMBER'}</div>
          </div>
          <button onClick={onLogout} style={navStyles.logoutBtn}>Logout</button>
        </div>
      </nav>

      {/* SUMMARY BAR */}
      <div style={{background:'var(--bg3)',borderBottom:'1px solid var(--border)',padding:'12px 28px',display:'flex',gap:32,alignItems:'center',overflowX:'auto'}}>
        {[
          {l:'Active Signals',v:allSignals.length},
          {l:'Swing Avg Return',v:fmtPct(swingAvg),c:clr(swingAvg)},
          {l:'LT Avg Return',v:fmtPct(ltAvg),c:clr(ltAvg)},
          {l:'Overall Win Rate',v:Math.round(winners/allSignals.length*100)+'%',c:'var(--gold)'},
          {l:'Winners',v:winners,c:'var(--green)'},
          {l:'Under Pressure',v:allSignals.length-winners,c:'var(--red)'},
        ].map(s=>(
          <div key={s.l} style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
            <span style={{fontSize:11,color:'var(--text2)'}}>{s.l}</span>
            <span style={{fontFamily:'DM Mono',fontSize:15,fontWeight:600,color:s.c||'var(--text)'}}>{s.v}</span>
          </div>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{flex:1,padding:'28px',overflowY:'auto'}}>
        {tab==='swing'&&<SignalGrid signals={swing} type="swing" isAdmin={isAdmin} onEdit={d=>setModal({type:'editSignal',data:d})} onDelete={id=>deleteSignal(id,'swing')}/>}
        {tab==='lt'&&<SignalGrid signals={lt} type="longterm" isAdmin={isAdmin} onEdit={d=>setModal({type:'editSignal',data:d})} onDelete={id=>deleteSignal(id,'longterm')}/>}
        {tab==='chart'&&<PnLChart swing={swing} lt={lt}/>}
        {tab==='admin'&&isAdmin&&<AdminPanel users={users} swing={swing} lt={lt} onAddUser={()=>setModal({type:'addUser'})} onToggleUser={toggleUser} onDeleteUser={deleteUser} onEditSignal={d=>setModal({type:'editSignal',data:d})} onDeleteSignal={deleteSignal}/>}
      </div>

      {/* MODALS */}
      {modal?.type==='addSignal'&&<SignalModal onClose={()=>setModal(null)} onSave={addSignal} title="Post New Signal"/>}
      {modal?.type==='editSignal'&&<SignalModal onClose={()=>setModal(null)} onSave={editSignal} initial={modal.data} title="Edit Signal"/>}
      {modal?.type==='addUser'&&<UserModal onClose={()=>setModal(null)} onSave={addUser}/>}
    </div>
  );
}

const navStyles = {
  tab:{background:'transparent',border:'none',color:'var(--text2)',cursor:'pointer',padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:500,display:'flex',alignItems:'center',gap:6,transition:'all 0.15s'},
  tabActive:{background:'var(--bg3)',color:'var(--text)',fontWeight:600},
  badge:{background:'var(--bg3)',color:'var(--text3)',fontSize:11,padding:'1px 7px',borderRadius:10,fontFamily:'DM Mono'},
  addBtn:{background:'var(--goldg)',border:'none',borderRadius:8,padding:'8px 18px',color:'#080b0f',fontWeight:700,fontSize:13,cursor:'pointer',flexShrink:0},
  logoutBtn:{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 14px',color:'var(--text2)',fontSize:12,cursor:'pointer'},
};

/* ─── SIGNAL GRID ──────────────────────────────────────────────── */
function SignalGrid({signals,type,isAdmin,onEdit,onDelete}) {
  const [sort,setSort]=useState('date');
  const [filt,setFilt]=useState('all');
  const sorted=[...signals].sort((a,b)=>{
    if(sort==='pnl')return pct(b)-pct(a);
    if(sort==='pnlasc')return pct(a)-pct(b);
    if(sort==='date')return new Date(b.date)-new Date(a.date);
    if(sort==='stock')return a.stock.localeCompare(b.stock);
    return 0;
  }).filter(s=>filt==='all'||(filt==='positive'&&s.cmp>s.buyPrice)||(filt==='negative'&&s.cmp<=s.buyPrice));

  const color=type==='swing'?'var(--blue)':'var(--purple)';

  return(
    <div>
      <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{fontWeight:700,fontSize:18,letterSpacing:-0.5}}>
          {type==='swing'?'⚡ Swing Trade Signals':'🏔 Long Term Positions'}
        </div>
        <div style={{flex:1}}/>
        <select value={filt} onChange={e=>setFilt(e.target.value)} style={sgStyles.sel}>
          <option value="all">All</option>
          <option value="positive">In Profit</option>
          <option value="negative">In Loss</option>
        </select>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={sgStyles.sel}>
          <option value="date">Latest First</option>
          <option value="pnl">Best P&L First</option>
          <option value="pnlasc">Worst P&L First</option>
          <option value="stock">A-Z</option>
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:18}}>
        {sorted.map(s=><SignalCard key={s.id} signal={s} type={type} isAdmin={isAdmin} onEdit={onEdit} onDelete={onDelete} accentColor={color}/>)}
        {sorted.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px 0',color:'var(--text3)'}}>No signals in this category yet.</div>}
      </div>
    </div>
  );
}

const sgStyles={
  sel:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 12px',color:'var(--text)',fontSize:12,cursor:'pointer',outline:'none'},
};

/* ─── SIGNAL CARD ──────────────────────────────────────────────── */
function SignalCard({signal:s,type,isAdmin,onEdit,onDelete,accentColor}) {
  const p=pct(s); const pos=p>=0;
  const tgtPct=((s.target-s.buyPrice)/s.buyPrice*100);
  const progress=Math.min(Math.max((s.cmp-s.buyPrice)/(s.target-s.buyPrice)*100,0),100);
  const sectors={Pharma:'#00d68f22',IT:'#3d8ef822',Banking:'#9f6ef522',Finance:'#9f6ef522',FMCG:'#f5b73122',Auto:'#ff4d6a22',EV:'#00d68f22',Infra:'#f5b73122',Power:'#f5b73122',Energy:'#f5b73122',Defence:'#ff4d6a22',Logistics:'#3d8ef822',Healthcare:'#00d68f22',Technology:'#3d8ef822',Electronics:'#3d8ef822',ETF:'#f5b73122',Chemicals:'#9f6ef522',Materials:'#9f6ef522'};
  const scBg=sectors[s.sector]||'#ffffff11';

  return(
    <div style={{background:'var(--bg2)',border:`1px solid var(--border)`,borderRadius:14,overflow:'hidden',display:'flex',flexDirection:'column',transition:'border-color 0.2s'}}>
      <div style={{height:3,background:pos?accentColor:'var(--red)'}}/>
      <div style={{padding:'18px 20px',flex:1,display:'flex',flexDirection:'column',gap:14}}>
        {/* header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:18,fontWeight:700,letterSpacing:-0.5}}>{s.stock}</div>
            <div style={{display:'flex',gap:8,marginTop:6,alignItems:'center'}}>
              <span style={{fontSize:11,background:scBg,padding:'2px 10px',borderRadius:20,color:'var(--text2)'}}>{s.sector}</span>
              <span style={{fontSize:11,color:'var(--text3)',fontFamily:'DM Mono'}}>{s.date}</span>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:'DM Mono',fontSize:22,fontWeight:700,color:clr(p)}}>{fmtPct(p)}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>Running P&L</div>
          </div>
        </div>

        {/* price grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          {[['BUY',s.buyPrice,'var(--text2)'],[`CMP`,s.cmp,clr(p)],['TARGET',s.target,'var(--gold)'],['SL',s.sl,'var(--red)']].map(([l,v,c])=>(
            <div key={l} style={{background:'var(--bg3)',borderRadius:8,padding:'9px 10px',textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--text3)',letterSpacing:0.5,marginBottom:3}}>{l}</div>
              <div style={{fontFamily:'DM Mono',fontSize:13,fontWeight:600,color:c}}>₹{Number(v).toLocaleString()}</div>
            </div>
          ))}
        </div>

        {/* progress bar */}
        <div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:11,color:'var(--text3)'}}>Progress to target</span>
            <span style={{fontSize:11,fontFamily:'DM Mono',color:'var(--gold)'}}>{progress.toFixed(0)}%</span>
          </div>
          <div style={{height:5,background:'var(--bg4)',borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',width:progress+'%',background:pos?accentColor:'var(--red)',borderRadius:3,transition:'width 0.5s'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
            <span style={{fontSize:10,color:'var(--text3)'}}>Entry ₹{s.buyPrice}</span>
            <span style={{fontSize:10,color:'var(--text3)'}}>Target +{tgtPct.toFixed(1)}%</span>
          </div>
        </div>

        {/* remark */}
        <div style={{background:'var(--bg3)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--text2)',lineHeight:1.7,fontStyle:'italic'}}>
          "{s.remark}"
        </div>

        {/* admin actions */}
        {isAdmin&&(
          <div style={{display:'flex',gap:8,borderTop:'1px solid var(--border)',paddingTop:12,marginTop:'auto'}}>
            <button onClick={()=>onEdit(s)} style={cardStyles.editBtn}>✏ Edit</button>
            <button onClick={()=>onDelete(s.id)} style={cardStyles.delBtn}>🗑 Remove</button>
          </div>
        )}
      </div>
    </div>
  );
}

const cardStyles={
  editBtn:{flex:1,background:'#3d8ef818',border:'1px solid #3d8ef844',borderRadius:7,padding:'7px',color:'var(--blue)',fontSize:12,cursor:'pointer',fontFamily:'Space Grotesk'},
  delBtn:{flex:1,background:'#ff4d6a18',border:'1px solid #ff4d6a44',borderRadius:7,padding:'7px',color:'var(--red)',fontSize:12,cursor:'pointer',fontFamily:'Space Grotesk'},
};

/* ─── P&L CHART ────────────────────────────────────────────────── */
function PnLChart({swing,lt}) {
  const all=[...swing.map(t=>({...t,cat:'swing'})),...lt.map(t=>({...t,cat:'lt'}))].sort((a,b)=>pct(b)-pct(a));
  const max=Math.max(...all.map(t=>Math.abs(pct(t))),1);
  const totalPL=all.reduce((s,t)=>s+(t.cmp-t.buyPrice),0)/all.length;
  const totalInv=all.reduce((s,t)=>s+t.buyPrice,0)/all.length;

  return(
    <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:14,padding:'28px 24px'}}>
      <div style={{textAlign:'center',marginBottom:8}}>
        <div style={{fontSize:20,fontWeight:700}}>IKT Investors Club — Running P&L % (Active Signals)</div>
        <div style={{fontSize:13,color:'var(--text2)',marginTop:8,display:'flex',gap:24,justifyContent:'center',flexWrap:'wrap'}}>
          <span>Swing Avg: <span style={{fontFamily:'DM Mono',color:clr(swing.reduce((s,t)=>s+pct(t),0)/swing.length)}}>{fmtPct(swing.reduce((s,t)=>s+pct(t),0)/(swing.length||1))}</span></span>
          <span>LT Avg: <span style={{fontFamily:'DM Mono',color:clr(lt.reduce((s,t)=>s+pct(t),0)/lt.length)}}>{fmtPct(lt.reduce((s,t)=>s+pct(t),0)/(lt.length||1))}</span></span>
          <span>Overall Win Rate: <span style={{fontFamily:'DM Mono',color:'var(--gold)'}}>{Math.round(all.filter(t=>t.cmp>t.buyPrice).length/all.length*100)}%</span></span>
        </div>
      </div>
      <div style={{display:'flex',gap:20,justifyContent:'center',margin:'16px 0 28px',flexWrap:'wrap'}}>
        {[['var(--green)','Swing +ve'],['var(--red)','Swing -ve'],['var(--blue)','LT +ve'],['var(--purple)','LT -ve']].map(([c,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text2)'}}>
            <div style={{width:12,height:12,background:c,borderRadius:2}}/>{l}
          </div>
        ))}
      </div>
      <div style={{overflowY:'auto',maxHeight:520}}>
        {all.map(t=>{
          const p=pct(t); const pos=p>=0; const isSwing=t.cat==='swing';
          const barColor=isSwing?(pos?'var(--green)':'var(--red)'):(pos?'var(--blue)':'var(--purple)');
          const barW=Math.abs(p)/max*320;
          return(
            <div key={t.id} style={{display:'flex',alignItems:'center',height:38,gap:0}}>
              <div style={{width:160,textAlign:'right',paddingRight:14,fontSize:12,color:'var(--text2)',flexShrink:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.stock}</div>
              <div style={{position:'relative',flex:1,display:'flex',alignItems:'center'}}>
                <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:1,background:'var(--border)'}}/>
                {pos?(
                  <div style={{marginLeft:'50%',height:24,width:barW,background:barColor,borderRadius:'0 4px 4px 0',boxShadow:`0 0 10px ${barColor}44`,display:'flex',alignItems:'center',paddingLeft:7}}>
                    <span style={{fontSize:11,fontFamily:'DM Mono',fontWeight:600,color:'#080b0f',whiteSpace:'nowrap'}}>+{p.toFixed(2)}%</span>
                  </div>
                ):(
                  <div style={{marginLeft:`calc(50% - ${barW}px)`,height:24,width:barW,background:barColor,borderRadius:'4px 0 0 4px',boxShadow:`0 0 10px ${barColor}44`,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:7}}>
                    <span style={{fontSize:11,fontFamily:'DM Mono',fontWeight:600,color:'#fff',whiteSpace:'nowrap'}}>{p.toFixed(2)}%</span>
                  </div>
                )}
              </div>
              <div style={{width:60,paddingLeft:8,fontSize:10,color:isSwing?'var(--blue)':'var(--purple)',flexShrink:0,fontWeight:600}}>
                {isSwing?'SWING':'LT'}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',borderTop:'1px solid var(--border)',paddingTop:10,marginTop:8,gap:0}}>
        <div style={{width:160}}/>
        <div style={{flex:1,display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',fontFamily:'DM Mono'}}>
          {['-60%','-40%','-20%','0%','+20%','+40%','+60%','+80%'].map(l=><span key={l}>{l}</span>)}
        </div>
        <div style={{width:60}}/>
      </div>
      <div style={{textAlign:'center',fontSize:11,color:'var(--text3)',marginTop:6}}>Return % per signal</div>
    </div>
  );
}

                    <td style={{padding:'10px 14px'}}><span style={{fontSize:11,color:s.cat==='swing'?'var(--blue)':'var(--purple)',fontWeight:600}}>{s.cat==='swing'?'⚡ SWING':'🏔 LT'}</span></td>

                    <td style={{padding:'10px 14px',fontFamily:'DM Mono',fontSize:12,color:clr(p)}}>₹{s.cmp}</td>
                    <td style={{padding:'10px 14px',fontFamily:'DM Mono',fontSize:12,color:'var(--gold)'}}>₹{s.target}</td>
                    <td style={{padding:'10px 14px',fontFamily:'DM Mono',fontSize:12,color:'var(--red)'}}>₹{s.sl}</td>
                    <td style={{padding:'10px 14px',fontFamily:'DM Mono',fontSize:13,fontWeight:700,color:clr(p)}}>{fmtPct(p)}</td>
                    <td style={{padding:'10px 14px',fontSize:12,color:'var(--text2)',fontFamily:'DM Mono'}}>{s.date}</td>
                    <td style={{padding:'10px 14px'}}>
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={()=>onEditSignal(s)} style={cardStyles.editBtn}>Edit</button>
                        <button onClick={()=>onDeleteSignal(s.id,s.cat)} style={cardStyles.delBtn}>Del</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ─── SIGNAL MODAL ─────────────────────────────────────────────── */
function SignalModal({onClose,onSave,initial,title}) {
  const blank={stock:'',sector:'',buyPrice:'',cmp:'',target:'',sl:'',date:new Date().toISOString().slice(0,10),category:'swing',remark:'',status:'active'};
  const [f,setF]=useState(initial||blank);
  const [errs,setErrs]=useState({});
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const sectors=['Pharma','IT','Banking','Finance','FMCG','Auto','EV','Infra','Power','Energy','Defence','Logistics','Healthcare','Technology','Electronics','ETF','Chemicals','Materials','Other'];

  const validate=()=>{const e={};if(!f.stock.trim())e.stock='Required';if(!f.buyPrice||isNaN(f.buyPrice))e.buyPrice='Required';if(!f.cmp||isNaN(f.cmp))e.cmp='Required';if(!f.target||isNaN(f.target))e.target='Required';if(!f.sl||isNaN(f.sl))e.sl='Required';setErrs(e);return!Object.keys(e).length};
  const save=()=>{if(!validate())return;onSave({...f,buyPrice:+f.buyPrice,cmp:+f.cmp,target:+f.target,sl:+f.sl})};

  const p=f.cmp&&f.buyPrice?((f.cmp-f.buyPrice)/f.buyPrice*100):null;

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'#000000cc',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,backdropFilter:'blur(4px)'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:16,padding:'32px',width:560,maxWidth:'95vw',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 32px 100px #00000099'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:22}}>
          <div style={{fontSize:18,fontWeight:700}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:22}}>×</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <MF label="Stock Name *" err={errs.stock}><input style={{...mStyles.input,...(errs.stock?{borderColor:'var(--red)'}:{})}} value={f.stock} onChange={e=>set('stock',e.target.value)} placeholder="e.g. Reliance"/></MF>
          <MF label="Signal Type *"><select style={mStyles.input} value={f.category} onChange={e=>set('category',e.target.value)}><option value="swing">⚡ Swing Trade</option><option value="longterm">🏔 Long Term</option></select></MF>
          <MF label="Buy Price ₹ *" err={errs.buyPrice}><input style={{...mStyles.input,...(errs.buyPrice?{borderColor:'var(--red)'}:{})}} type="number" value={f.buyPrice} onChange={e=>set('buyPrice',e.target.value)} placeholder="Entry price"/></MF>
          <MF label="CMP ₹ *" err={errs.cmp}><input style={{...mStyles.input,...(errs.cmp?{borderColor:'var(--red)'}:{})}} type="number" value={f.cmp} onChange={e=>set('cmp',e.target.value)} placeholder="Current market price"/></MF>
          <MF label="Target ₹ *" err={errs.target}><input style={{...mStyles.input,...(errs.target?{borderColor:'var(--red)'}:{})}} type="number" value={f.target} onChange={e=>set('target',e.target.value)} placeholder="Price target"/></MF>
          <MF label="Stop Loss ₹ *" err={errs.sl}><input style={{...mStyles.input,...(errs.sl?{borderColor:'var(--red)'}:{})}} type="number" value={f.sl} onChange={e=>set('sl',e.target.value)} placeholder="Stop loss"/></MF>
          <MF label="Signal Date"><input style={mStyles.input} type="date" value={f.date} onChange={e=>set('date',e.target.value)}/></MF>
          <MF label="Sector"><select style={mStyles.input} value={f.sector} onChange={e=>set('sector',e.target.value)}><option value="">Select sector</option>{sectors.map(s=><option key={s} value={s}>{s}</option>)}</select></MF>
          <MF label="Remark / Rationale" style={{gridColumn:'1/-1'}}>
            <textarea style={{...mStyles.input,resize:'vertical',minHeight:72}} value={f.remark} onChange={e=>set('remark',e.target.value)} placeholder="Why this trade? What to watch?"/>
          </MF>
        </div>
        {p!==null&&(
          <div style={{background:'var(--bg3)',borderRadius:8,padding:'12px 16px',marginTop:14,display:'flex',gap:24,flexWrap:'wrap'}}>
            <div style={{fontSize:13}}><span style={{color:'var(--text2)'}}>P&L: </span><span style={{fontFamily:'DM Mono',fontWeight:700,color:clr(p)}}>{fmtPct(p)}</span></div>
            {f.target&&<div style={{fontSize:13}}><span style={{color:'var(--text2)'}}>Upside: </span><span style={{fontFamily:'DM Mono',fontWeight:700,color:'var(--gold)'}}>+{((f.target-f.buyPrice)/f.buyPrice*100).toFixed(2)}%</span></div>}
            {f.sl&&<div style={{fontSize:13}}><span style={{color:'var(--text2)'}}>Risk: </span><span style={{fontFamily:'DM Mono',fontWeight:700,color:'var(--red)'}}>-{((f.buyPrice-f.sl)/f.buyPrice*100).toFixed(2)}%</span></div>}
          </div>
        )}
        <div style={{display:'flex',gap:12,marginTop:22,justifyContent:'flex-end'}}>
          <button onClick={onClose} style={mStyles.cancelBtn}>Cancel</button>
          <button onClick={save} style={mStyles.saveBtn}>{initial?'Update Signal':'Post Signal'}</button>
        </div>
      </div>
    </div>
  );
}
function MF({label,children,err}){return <div style={{display:'flex',flexDirection:'column',gap:5}}><label style={{fontSize:12,color:'var(--text2)',fontWeight:500}}>{label}</label>{children}{err&&<span style={{fontSize:11,color:'var(--red)'}}>{err}</span>}</div>}
const mStyles={
  input:{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',color:'var(--text)',fontSize:13,outline:'none',width:'100%'},
  cancelBtn:{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 20px',color:'var(--text2)',fontSize:14,cursor:'pointer',fontFamily:'Space Grotesk'},
  saveBtn:{background:'var(--goldg)',border:'none',borderRadius:8,padding:'10px 24px',color:'#080b0f',fontFamily:'Space Grotesk',fontSize:14,fontWeight:700,cursor:'pointer'},
};

/* ═══════════════════════════════════════════════════════════════ */
/*  APP ROOT                                                       */
/* ═══════════════════════════════════════════════════════════════ */
function App() {
  const [screen,setScreen]=useState('landing'); // landing | login | dashboard
  const [currentUser,setCurrentUser]=useState(null);
  const [tweaks,setTweaks]=useState(false);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')setTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const handleLogin=user=>{
    setCurrentUser(user);
    setScreen('dashboard');
  };

  const handleLogout=()=>{
    setCurrentUser(null);
    setScreen('landing');
  };

  return(
    <>
      <style>{`
        @keyframes spin{to{transform:rotate(360deg)}}
        button{transition:opacity 0.15s,filter 0.15s}
        button:hover{filter:brightness(1.08)}
        a{transition:opacity 0.15s}
        a:hover{opacity:0.85}
      `}</style>
      {screen==='landing'&&<LandingPage onLogin={()=>setScreen('login')}/>}
      {screen==='login'&&<LoginPage onBack={()=>setScreen('landing')} onLoginSuccess={handleLogin}/>}
      {screen==='dashboard'&&currentUser&&<MemberDashboard user={currentUser} onLogout={handleLogout}/>}
      {tweaks&&<TweaksPanel onClose={()=>setTweaks(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
